<script>
  const API_URL = "http://localhost:5000/api/chat"; 
  // ⇦ بدّل هذا بالرابط النهائي تاع السيرفر بعد النشر

  const messagesDiv = document.getElementById("messages");
  const userInput = document.getElementById("userInput");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.dir = "auto"; // يضبط اتجاه النص حسب اللغة (عربي/إنجليزي)
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    addMessage("👤 أنت: " + message, "user");
    userInput.value = "";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      if (data.reply) {
        addMessage(data.reply, "bot");
      } else {
        addMessage("⚠️ خطأ: لم يصلنا رد من الخادم.", "bot");
      }
    } catch (err) {
      addMessage("⚠️ خطأ: تعذر الاتصال بالسيرفر.", "bot");
    }
  }

  userInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>
