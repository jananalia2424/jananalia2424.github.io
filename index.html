<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي مع شات جيبيتي</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      overflow-x: hidden;
    }

    /* أشكال عائمة */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      animation: float 8s infinite ease-in-out;
    }
    .shape1 { width: 120px; height: 120px; background: #81d4fa; top: 10%; left: 10%; }
    .shape2 { width: 200px; height: 200px; background: #a5d6a7; bottom: 15%; right: 15%; }
    .shape3 { width: 80px; height: 80px; background: #ffcc80; top: 50%; right: 30%; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    /* محرك البحث */
    .search-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px;
    }
    .search-bar input {
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      width: 250px;
    }
    .search-bar button {
      margin-left: -40px;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* أيقونات */
    .icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
      gap: 15px;
    }
    .icon {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .icon:hover { transform: scale(1.1); }

    /* Popup */
    .popup {
      display: none;
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      z-index: 1000;
    }
    .popup a { display: block; margin: 5px 0; color: #00796b; text-decoration: none; }
    .popup a:hover { text-decoration: underline; }
    .close-popup {
      cursor: pointer;
      color: red;
      font-weight: bold;
      float: left;
    }

    /* شات جيبيتي */
    .chatbot-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0078ff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .chat-window {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 300px;
      max-height: 400px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      background: #0078ff;
      color: white;
      padding: 10px;
      text-align: center;
    }
    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }
    .chat-input input {
      flex: 1;
      border: none;
      padding: 10px;
    }
    .chat-input button {
      background: #0078ff;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- أشكال -->
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
  <div class="shape shape3"></div>

  <!-- محرك البحث -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="ابحث في قوقل...">
    <button onclick="openLinks()">🔍</button>
  </div>

  <!-- الأيقونات -->
  <div class="icons">
    <div class="icon">🏠<br>Accueil</div>
    <div class="icon">🖼️<br>صور</div>
    <div class="icon">🏛️<br>آثار</div>
    <div class="icon">🎨<br>فنون</div>
    <div class="icon">ℹ️<br>من نحن</div>
    <div class="icon">🔗<br>بارتاج</div>
    <div class="icon">➕<br>Plus</div>
    <div class="icon">👥<br>Inviter</div>
    <div class="icon">👫<br>Amie</div>
    <div class="icon" onclick="openPopup('videoPopup')">🎥<br>Video</div>
    <div class="icon" onclick="openPopup('gamingPopup')">🎮<br>Gaming</div>
    <div class="icon" onclick="openPopup('chatPopup')">💬<br>Chat</div>
  </div>

  <!-- Popups -->
  <div id="videoPopup" class="popup">
    <span class="close-popup" onclick="closePopup('videoPopup')">X</span>
    <h3>📺 أفلام عادل إمام</h3>
    <a href="https://www.youtube.com/results?search_query=افلام+عادل+امام" target="_blank">YouTube</a>
    <a href="https://www.imdb.com/name/nm0407682/" target="_blank">IMDb</a>
    <a href="https://www.rottentomatoes.com/celebrity/adel_imam" target="_blank">Rotten Tomatoes</a>
  </div>

  <div id="gamingPopup" class="popup">
    <span class="close-popup" onclick="closePopup('gamingPopup')">X</span>
    <h3>🎮 ألعاب أطفال</h3>
    <a href="https://pbskids.org/games/" target="_blank">PBS Kids</a>
    <a href="https://www.cartoonnetworkhq.com/games" target="_blank">Cartoon Network</a>
    <a href="https://www.nick.com/games" target="_blank">Nickelodeon</a>
    <a href="https://www.friv.com" target="_blank">Friv</a>
  </div>

  <div id="chatPopup" class="popup">
    <span class="close-popup" onclick="closePopup('chatPopup')">X</span>
    <h3>💬 مواقع الشات</h3>
    <a href="https://www.omegle.com" target="_blank">Omegle</a>
    <a href="https://chatroulette.com" target="_blank">Chatroulette</a>
    <a href="https://chatiw.com" target="_blank">Chatiw</a>
    <a href="https://tinychat.com" target="_blank">Tinychat</a>
    <a href="https://www.tiktok.com" target="_blank">TikTok</a>
  </div>

  <!-- زر شات جيبيتي -->
  <button class="chatbot-btn" onclick="toggleChat()">🤖</button>
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">شات الدعم - ChatGPT</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    function openLinks() {
      let query = document.getElementById("searchInput").value;
      if (query.trim() !== "") {
        window.open(`https://www.google.com/search?q=${query}`, "_blank");
      } else {
        window.open("https://www.youtube.com/@jananalia24", "_blank");
        window.open("https://www.youtube.com/@jananalia2424", "_blank");
        window.open("https://www.facebook.com/groups/jananalia2424", "_blank");
      }
    }

    function openPopup(id) {
      document.getElementById(id).style.display = "block";
    }
    function closePopup(id) {
      document.getElementById(id).style.display = "none";
    }

    function toggleChat() {
      const chat = document.getElementById("chatWindow");
      chat.style.display = (chat.style.display === "none" || chat.style.display === "") ? "flex" : "none";
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const messages = document.getElementById("chatMessages");
      const text = input.value.trim();
      if (!text) return;

      messages.innerHTML += `<div><b>أنت:</b> ${text}</div>`;
      input.value = "";

      try {
        const res = await fetch("http://localhost:5000/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        messages.innerHTML += `<div><b>ChatGPT:</b> ${data.reply}</div>`;
      } catch (err) {
        messages.innerHTML += `<div style="color:red;"><b>خطأ:</b> تعذر الاتصال بالسيرفر.</div>`;
      }

      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
