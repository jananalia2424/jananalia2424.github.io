<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📸 موقع الصور الجميلة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }
    .categories, .search-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .categories button.active,
    .categories button:hover {
      background: #0ea5e9;
    }
    .search-box input {
      padding: 7px 15px;
      border-radius: 20px;
      border: none;
      min-width: 200px;
      outline: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .grid img:hover { transform: scale(1.05); }
    footer {
      background: #1e293b;
      text-align: center;
      padding: 10px;
      color: #94a3b8;
      margin-top: 20px;
    }
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 12px;
      box-shadow: 0 0 20px #000;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام يحتوي على أجمل الصور</p>
  </header>

  <!-- 🔎 مربع البحث -->
  <div class="search-box">
    <input type="text" id="search" placeholder="ابحث عن صورة (مثال: باريس، تيمقاد)">
  </div>

  <!-- 🔘 التصنيفات -->
  <nav class="categories">
    <button class="active" onclick="filter('all', this)">الكل</button>
    <button onclick="filter('nature', this)">طبيعة</button>
    <button onclick="filter('cities', this)">مدن</button>
    <button onclick="filter('art', this)">فن</button>
    <button onclick="filter('heritage', this)">آثار</button>
  </nav>

  <!-- 🖼️ الصور -->
  <main class="grid" id="gallery">
    <!-- 🌲 طبيعة -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="جبال">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="شلال">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800" data-cat="nature" alt="بحر">
    <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?q=80&w=800" data-cat="nature" alt="غابة">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="صحراء">

    <!-- 🏙️ مدن -->
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="مدينة">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800" data-cat="cities" alt="بودابست">
    <img src="https://images.unsplash.com/photo-1526481280698-8fcc42f7b7c7?q=80&w=800" data-cat="cities" alt="بوخارست">
    <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=800" data-cat="cities" alt="باريس">
    <img src="https://images.unsplash.com/photo-1508057198894-247b23fe5ade?q=80&w=800" data-cat="cities" alt="روما">
    <img src="https://images.unsplash.com/photo-1543353071-10c8ba85a904?q=80&w=800" data-cat="cities" alt="الجزائر العاصمة">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Constantine_city.jpg" data-cat="cities" alt="قسنطينة">

    <!-- 🎨 فن -->
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" data-cat="art" alt="فن">
    <img src="https://images.unsplash.com/photo-1549887534-5a8b5e6de7f6?q=80&w=800" data-cat="art" alt="لوحة فنية">
    <img src="https://images.unsplash.com/photo-1523731407965-2430cd12f5e4?q=80&w=800" data-cat="art" alt="جدارية">
    <img src="https://images.unsplash.com/photo-1503602642458-232111445657?q=80&w=800" data-cat="art" alt="فن حديث">

    <!-- 🏛️ آثار -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Guelma_roman_theater.jpg" data-cat="heritage" alt="المسرح الروماني بقالمة">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Timgad_Ruins.jpg" data-cat="heritage" alt="تيمقاد">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/42/Djemila_Ruins.jpg" data-cat="heritage" alt="جميلة">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Casbah_Algiers.jpg" data-cat="heritage" alt="قصبة الجزائر">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Baalbek-temple-lebanon.jpg" data-cat="heritage" alt="بعلبك">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Kheops-Pyramid.jpg" data-cat="heritage" alt="الأهرامات">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Al_Khazneh_Petra_Jordan.jpg" data-cat="heritage" alt="البتراء">
  </main>

  <footer>
    © 2025 موقع الصور الجميلة — جميع الحقوق محفوظة
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    // 🔘 فلترة التصنيفات
    function filter(cat, btn) {
      document.querySelectorAll('#gallery img').forEach(img => {
        img.style.display = (cat === 'all' || img.dataset.cat === cat) ? 'block' : 'none';
      });
      document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // 🔎 البحث
    document.getElementById('search').addEventListener('keyup', function() {
      let val = this.value.toLowerCase();
      document.querySelectorAll('#gallery img').forEach(img => {
        img.style.display = img.alt.toLowerCase().includes(val) ? 'block' : 'none';
      });
    });

    // 🖼️ Lightbox
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    document.querySelectorAll('#gallery img').forEach(img => {
      img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
      });
    });
    function closeLightbox() {
      lightbox.style.display = 'none';
    }
  </script>
</body>
</html>
