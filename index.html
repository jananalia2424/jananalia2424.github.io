<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي العصري</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      background-color: #121212;
      color: #eee;
      margin: 0;
      padding: 0;
    }
    header {
      background: #222;
      padding: 10px;
      text-align: center;
      color: #fff;
    }
    nav {
      background: #333;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
    }
    section {
      padding: 20px;
    }
    .card {
      background: #1e1e1e;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
    #chat {
      margin-top: 30px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 8px rgba(0,0,0,0.7);
    }
    #chatBox {
      height: 200px;
      overflow-y: auto;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    #chatBox p {
      margin: 5px 0;
    }
    input[type="text"] {
      width: 70%;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }
    button {
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: #4caf50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌍 موقعي العصري</h1>
  </header>

  <nav>
    <a href="#home">الرئيسية</a>
    <a href="#about">من نحن</a>
    <a href="#gallery">المعرض</a>
    <a href="#support">فريق الدعم</a>
  </nav>

  <section id="home">
    <h2>مرحبا بك في موقعي ✨</h2>
    <p>هنا تجد محتوى عصري، روابط قنواتي على يوتيوب وفيسبوك، وأيضا دردشة مباشرة مع شات جي بي تي 🎉</p>
  </section>

  <section id="about">
    <h2>من نحن</h2>
    <div class="card">
      <p>زورونا على المواقع التالية:</p>
      <ul>
        <li><a href="https://www.youtube.com/@jananalia2424" target="_blank">قناتي على يوتيوب 1</a></li>
        <li><a href="https://www.youtube.com/@jananalia24" target="_blank">قناتي على يوتيوب 2</a></li>
        <li><a href="https://www.facebook.com/groups/jananalia2424" target="_blank">قروب الفيسبوك</a></li>
      </ul>
    </div>
  </section>

  <section id="support">
    <h2>💬 فريق الدعم</h2>
    <div id="chat">
      <div id="chatBox"></div>
      <input id="userInput" type="text" placeholder="اكتب رسالتك هنا...">
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </section>

  <script>
    async function sendMessage() {
      const message = document.getElementById("userInput").value;
      if (!message.trim()) return;

      document.getElementById("chatBox").innerHTML += `<p><b>أنت:</b> ${message}</p>`;

      const res = await fetch("https://my-backend-cyj8.onrender.com/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const data = await res.json();
      document.getElementById("chatBox").innerHTML += `<p><b>شات:</b> ${data.reply}</p>`;
      document.getElementById("userInput").value = "";
      document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
    }
  </script>
</body>
</html>
