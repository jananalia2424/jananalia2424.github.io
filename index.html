<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Beautiful Images Website — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    header {
      background: #161b22;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }
    header p { margin: 5px 0; color: #9ba3af; }

    .search-bar {
      margin-top: 10px;
    }
    .search-bar input {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #30363d;
      width: 250px;
      background: #0d1117;
      color: #e6edf3;
    }
    .categories {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #21262d;
      border: none;
      color: #e6edf3;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .categories button.active {
      background: #3b82f6;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img, .card {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }
    .card {
      background: #21262d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      height: 150px;
    }
    .card a {
      color: #58a6ff;
      text-decoration: none;
      font-weight: bold;
      margin-top: 5px;
    }
    footer {
      background: #161b22;
      text-align: center;
      padding: 10px;
      color: #8b949e;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 Beautiful Images Website</h1>
    <p>A gallery containing the most beautiful photos</p>
    <div class="search-bar">
      <form action="https://www.google.com/search" method="get" target="_blank">
        <input type="text" name="q" placeholder="Search on Google...">
      </form>
    </div>
  </header>

  <nav class="categories">
    <button class="active" onclick="filter('all', this)">All</button>
    <button onclick="filter('nature', this)">Nature</button>
    <button onclick="filter('cities', this)">Cities</button>
    <button onclick="filter('art', this)">Art</button>
    <button onclick="filter('monuments', this)">Monuments</button>
  </nav>

  <main class="grid" id="gallery">
    <!-- Nature -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="Mountains">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="Waterfall">

    <!-- Cities -->
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="City">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800" data-cat="cities" alt="Budapest">
    <img src="https://images.unsplash.com/photo-1543269865-cbf427effbad?q=80&w=800" data-cat="cities" alt="Bucharest">

    <!-- Art -->
    <div class="card" data-cat="art">
      🎨 My YouTube Channel 1
      <a href="https://www.youtube.com/@jananalia2424" target="_blank">Visit</a>
    </div>
    <div class="card" data-cat="art">
      🎭 My YouTube Channel 2
      <a href="https://www.youtube.com/@jananalia24" target="_blank">Visit</a>
    </div>

    <!-- Monuments -->
    <img src="https://images.unsplash.com/photo-1609421142486-8c6594a2be42?q=80&w=800" data-cat="monuments" alt="Roman Amphitheatre">
    <img src="https://images.unsplash.com/photo-1570741061277-9b02e7c6a65e?q=80&w=800" data-cat="monuments" alt="Ancient Site">
    <img src="https://images.unsplash.com/photo-1563906267088-b029e7101114?q=80&w=800" data-cat="monuments" alt="Temple">
  </main>

  <footer>
    © 2025 Beautiful Images Website — All rights reserved
  </footer>

  <script>
    function filter(cat, el) {
      document.querySelectorAll('#gallery img, #gallery .card').forEach(item => {
        if (cat === 'all' || item.dataset.cat === cat) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
      document.querySelectorAll('.categories button').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
