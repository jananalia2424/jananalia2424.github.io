<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>أجمل المناظر الطبيعية والتاريخية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Tajawal:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Tajawal', Arial, sans-serif;
      background: #e6f4ff;
      color: #333;
    }
    header {
      background: #4da6ff;
      color: white;
      text-align: center;
      padding: 15px;
      font-family: 'Cairo', sans-serif;
      font-size: 22px;
      font-weight: bold;
      position: relative;
    }
    /* Search bar */
    .search-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 10px;
    }
    .search-container input {
      padding: 8px;
      border-radius: 20px;
      border: 1px solid #ccc;
      width: 250px;
    }
    .search-container button {
      margin-right: -35px;
      background: none;
      border: none;
      cursor: pointer;
    }
    .search-container svg {
      width: 18px;
      height: 18px;
      fill: #555;
    }
    h2.title {
      text-align: center;
      margin: 20px;
      font-family: 'Cairo', sans-serif;
      color: #c14438;
    }
    /* Icons */
    .icons {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
    }
    .icon {
      text-align: center;
      cursor: pointer;
    }
    .icon span {
      font-size: 40px;
      display: block;
    }
    .gallery {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: 8px;
    }
    /* Chat icon */
    .chat-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      background: #ff9933;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .chat-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    /* Chat box */
    .chat-box {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      background: #4da6ff;
      color: white;
      padding: 10px;
      text-align: center;
      border-radius: 10px 10px 0 0;
    }
    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }
    .chat-input input {
      flex: 1;
      border: none;
      padding: 10px;
    }
    .chat-input button {
      background: #ff9933;
      border: none;
      color: white;
      padding: 10px 15px;
      cursor: pointer;
    }
    footer {
      background: #c14438;
      color: white;
      text-align: center;
      padding: 15px;
    }
    footer a {
      color: yellow;
      margin: 0 10px;
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  محرك البحث
  <div class="search-container">
    <input type="text" placeholder="ابحث هنا...">
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 20l-5.8-5.8a7.5 7.5 0 1 0-1.4 1.4L20 21zM4 10a6 6 0 1 1 12 0 6 6 0 0 1-12 0z"/></svg>
    </button>
  </div>
</header>

<h2 class="title">✨ أجمل المناظر الطبيعية والتاريخية في العالم ✨</h2>

<div class="icons">
  <div class="icon" onclick="showGallery('photos')"><span>📷</span>الصور</div>
  <div class="icon" onclick="showGallery('monuments')"><span>🏛️</span>الآثار</div>
  <div class="icon" onclick="showGallery('arts')"><span>🎨</span>الفنون</div>
  <div class="icon" onclick="showGallery('about')"><span>ℹ️</span>من نحن</div>
</div>

<div id="photos" class="gallery">
  <img src="https://source.unsplash.com/400x300/?nature,mountains" alt="">
  <img src="https://source.unsplash.com/400x300/?nature,forest" alt="">
  <img src="https://source.unsplash.com/400x300/?nature,beach" alt="">
</div>

<div id="monuments" class="gallery">
  <img src="https://source.unsplash.com/400x300/?pyramids" alt="">
  <img src="https://source.unsplash.com/400x300/?rome,ruins" alt="">
  <img src="https://source.unsplash.com/400x300/?petra,jordan" alt="">
</div>

<div id="arts" class="gallery">
  <img src="https://source.unsplash.com/400x300/?mona-lisa" alt="">
  <img src="https://source.unsplash.com/400x300/?starry-night" alt="">
  <img src="https://source.unsplash.com/400x300/?picasso,painting" alt="">
</div>

<div id="about" class="gallery">
  <p style="grid-column: span 3; text-align: center; font-size: 18px;">
    هذا الموقع يعرض أجمل المناظر الطبيعية، الآثار التاريخية، والفنون العالمية من مختلف الحضارات.
  </p>
</div>

<!-- Messenger icon -->
<div class="chat-icon" onclick="toggleChat()">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36"><path d="M18 0C8.06 0 0 7.34 0 16.39c0 5.14 2.61 9.7 6.67 12.68V36l6.09-3.34c1.68.47 3.47.73 5.24.73 9.94 0 18-7.34 18-16.39C36 7.34 27.94 0 18 0zm1.76 22.41l-4.77-5.1-9.42 5.1 10.51-11.2 4.87 5.1 9.33-5.1-10.52 11.2z"/></svg>
</div>

<!-- Chat box -->
<div class="chat-box" id="chatBox">
  <div class="chat-header">شات جي بي تي</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
    <button onclick="sendMessage()">إرسال</button>
  </div>
</div>

<footer>
  زورونا على مواقعنا:
  <a href="https://www.youtube.com/@jananalia24" target="_blank">قناة يوتيوب رقم 1</a> |
  <a href="https://www.youtube.com/@jananalia24" target="_blank">قناة يوتيوب رقم 2</a> |
  <a href="https://www.facebook.com/groups/jananalia2424" target="_blank">مجموعتنا على فايسبوك</a>
</footer>

<script>
  function showGallery(id) {
    document.querySelectorAll('.gallery').forEach(el => el.style.display = 'none');
    document.getElementById(id).style.display = 'grid';
  }

  function toggleChat() {
    const box = document.getElementById('chatBox');
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const messages = document.getElementById('chatMessages');
    const text = input.value.trim();
    if (!text) return;

    // Display user message
    const userMsg = document.createElement('div');
    userMsg.textContent = "👤: " + text;
    messages.appendChild(userMsg);

    input.value = '';

    // Call backend
    const API_ENDPOINT = "https://my-backend-cyj8.onrender.com/api/chat";
    try {
      const res = await fetch(API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      const botMsg = document.createElement('div');
      botMsg.textContent = "🤖: " + data.reply;
      messages.appendChild(botMsg);

      messages.scrollTop = messages.scrollHeight;
    } catch (err) {
      const errorMsg = document.createElement('div');
      errorMsg.textContent = "❌ خطأ في الاتصال بالسيرفر";
      messages.appendChild(errorMsg);
    }
  }
</script>

</body>
</html>
