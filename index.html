<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>موقع الصور الجميلة — معرض</title>
  <style>
    body{margin:0;font-family:'Cairo',sans-serif;background:#0f172a;color:#fff}
    header,footer{padding:16px;text-align:center;background:#111}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;padding:20px}
    .card img{width:100%;border-radius:12px}
    .player{position:fixed;bottom:20px;right:20px;background:#222;padding:10px 16px;border-radius:12px;cursor:pointer}
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام مع موسيقى خلفية (بيانو + قيتار)</p>
  </header>

  <main>
    <section class="grid">
      <div class="card"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800&auto=format&fit=crop" alt="جبال"/></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800&auto=format&fit=crop" alt="مدينة"/></div>
      <div class="card"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800&auto=format&fit=crop" alt="فن"/></div>
    </section>
  </main>

  <footer>© 2025 موقع الصور الجميلة — جميع الحقوق محفوظة</footer>

  <!-- مشغل الموسيقى -->
  <audio id="bgmusic" loop autoplay muted>
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQAAAAA=" type="audio/wav">
  </audio>
  <div class="player" onclick="toggleMusic()">🔊 تشغيل / إيقاف</div>

  <script>
    const music = document.getElementById('bgmusic');
    function toggleMusic() {
      if(music.muted) {
        music.muted = false;
        music.play();
      } else {
        music.muted = true;
      }
    }
  </script>
</body>
</html>
