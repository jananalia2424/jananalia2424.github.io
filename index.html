<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>موقع الصور الجميلة — معرض</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }
    .categories {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .categories button:hover {
      background: #475569;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .grid img:hover {
      transform: scale(1.05);
    }
    footer {
      background: #1e293b;
      text-align: center;
      padding: 10px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام يحتوي على أجمل الصور السياحية والأثرية</p>
  </header>

  <nav class="categories">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('nature')">طبيعة</button>
    <button onclick="filter('cities')">مدن</button>
    <button onclick="filter('art')">فن</button>
    <button onclick="filter('heritage')">آثار</button>
  </nav>

  <main class="grid" id="gallery">
    <!-- طبيعة -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="جبال">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="شلال">

    <!-- مدن -->
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="مدينة">
    <img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2?q=80&w=800" data-cat="cities" alt="بودابست">
    <img src="https://images.unsplash.com/photo-1544986581-efac024faf62?q=80&w=800" data-cat="cities" alt="بوخارست">

    <!-- فن -->
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" data-cat="art" alt="فن">

    <!-- آثار -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Ancient_Roman_Theater_in_Guelma.jpg" data-cat="heritage" alt="المسرح الروماني قالمة">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Timgad%2C_Roman_ruins.jpg" data-cat="heritage" alt="تيمقاد الأثرية">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/64/Djemila-Ruins-Algeria.jpg" data-cat="heritage" alt="جميلة الأثرية">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Casbah_Algiers.jpg" data-cat="heritage" alt="قصبة الجزائر">
  </main>

  <footer>
    © 2025 موقع الصور الجميلة — جميع الحقوق محفوظة
  </footer>

  <script>
    function filter(cat) {
      document.querySelectorAll('#gallery img').forEach(img => {
        if (cat === 'all' || img.dataset.cat === cat) {
          img.style.display = 'block';
        } else {
          img.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
