<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>واجهة الدعم</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; direction: rtl; }
    #chat-container { width: 60%; margin: 50px auto; background: #fff; padding: 20px; border-radius: 10px; }
    #messages { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
    .msg { margin: 5px 0; padding: 8px; border-radius: 6px; }
    .user { background: #d1ecf1; text-align: right; }
    .support { background: #f8d7da; text-align: left; }
    .time { font-size: 0.75em; color: #555; display: block; margin-top: 4px; }
    #input { width: 80%; padding: 8px; }
    #send { padding: 8px 12px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <h2>مرحبا بك في خدمة الدعم 💬</h2>
    <div id="messages"></div>
    <input id="input" placeholder="اكتب رسالتك هنا..." />
    <button id="send">إرسال</button>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    const send = document.getElementById("send");

    function getTime() {
      const now = new Date();
      return now.toLocaleTimeString("ar-DZ", { hour: "2-digit", minute: "2-digit" }) +
             " - " +
             now.toLocaleDateString("ar-DZ");
    }

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;

      const content = document.createElement("div");
      content.innerText = text;

      const time = document.createElement("span");
      time.className = "time";
      time.innerText = getTime();

      div.appendChild(content);
      div.appendChild(time);

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    send.addEventListener("click", async () => {
      const text = input.value.trim();
      if (!text) return;

      // رسالة المستخدم
      addMessage(text, "user");
      input.value = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();

        // رد فريق الدعم
        addMessage(data.reply || "فريق الدعم غير متاح الآن.", "support");
      } catch (err) {
        addMessage("⚠️ خطأ في الاتصال بالخادم.", "support");
      }
    });
  </script>
</body>
</html>
