<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي العصري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      padding: 15px;
      text-align: center;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      animation: slideDown 1s ease;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }
    .search-bar {
      display: flex;
      justify-content: center;
      margin: 20px auto;
      max-width: 450px;
      background: #fff;
      border-radius: 30px;
      padding: 8px 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 10px 12px;
      font-size: 14px;
      border-radius: 30px;
    }
    .search-bar button {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 18px;
      color: #4facfe;
      transition: transform 0.2s;
    }
    .search-bar button:hover {
      transform: scale(1.2);
    }
    .title {
      text-align: center;
      margin: 25px 10px;
      font-size: 22px;
      font-weight: bold;
      color: #2d2d2d;
    }
    .icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 25px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      width: 120px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .card img {
      display: block;
      margin: 0 auto 10px auto;
      width: 55px;
      height: 55px;
      object-fit: contain;
    }
    .card p {
      margin: 0;
      font-size: 15px;
      font-weight: bold;
      color: #444;
    }
    .chat-container {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .messages {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 15px;
      padding-right: 5px;
    }
    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: fadeSlide 0.5s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user {
      background: #e1bee7;
      text-align: right;
    }
    .bot {
      background: #c8e6c9;
      text-align: left;
    }
    .bot::before {
      content: "💬 فريق الدعم: ";
      font-weight: bold;
      color: #2d7a0b;
    }
    .input-box {
      display: flex;
      gap: 10px;
    }
    .input-box input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .input-box button {
      padding: 10px 15px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.3s, transform 0.2s;
    }
    .input-box button:hover {
      transform: scale(1.1);
    }
    footer {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
    footer a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

  <header>🌟 موقعي العصري 🌟</header>

  <!-- محرك البحث -->
  <div class="search-bar">

      <button type="submit">🔍</button>
    </form>

  <div class="title">موقعي العصري لأجمل الصور التاريخية والطبيعة</div>

  </footer>
