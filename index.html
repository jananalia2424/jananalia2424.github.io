<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نسخة 40 - الصفحة الرئيسية</title>
<style>
  /* ---------- ألوان وتدرج ---------- */
  body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #b22222, #f4a460);
    color: #fff;
  }
  /* ---------- رأس الصفحة ---------- */
  header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: rgba(0,0,0,0.5);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header input[type="text"] {
    flex: 1;
    padding: 8px;
    border-radius: 20px;
    border: none;
    outline: none;
  }
  header button {
    margin-left: 10px;
    padding: 8px 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  /* ---------- أيقونات مستطيلة ---------- */
  .icons {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    padding: 15px;
  }
  .icon {
    width: 120px;
    height: 120px;
    margin: 10px;
    border-radius: 15px;
    text-align: center;
    padding: 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    background: rgba(255,255,255,0.2);
    transition: transform 0.2s;
  }
  .icon:hover { transform: scale(1.1); }
  .icon img { max-width: 80px; max-height: 60px; margin: auto; }
  .icon span { display: block; margin-top: 5px; font-size: 14px; color: #fff; }
  /* ---------- صور عائمة أسفل ---------- */
  .floating-images {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    pointer-events: none;
    opacity: 0.8;
  }
  .floating-images img {
    width: 60px;
    animation: float 5s infinite ease-in-out;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  /* ---------- شات GPT ---------- */
  .chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    max-height: 400px;
    background: rgba(0,0,0,0.7);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
  }
  .chat-input {
    display: flex;
    border-top: 1px solid #fff;
  }
  .chat-input input {
    flex: 1;
    padding: 8px;
    border: none;
    outline: none;
    border-radius: 0;
  }
  .chat-input button {
    padding: 8px 12px;
    border: none;
    background: #b22222;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- رأس الصفحة -->
<header>
  <input type="text" id="search" placeholder="ابحث هنا...">
  <button onclick="searchGoogle()">🔍</button>
</header>

<!-- أيقونات الصفحة -->
<div class="icons">
  <div class="icon" onclick="openLinks(['https://www.youtube.com/@jananalia24','https://www.youtube.com/@jananalia2424'])">
    <img src="https://img.icons8.com/ios-filled/100/youtube-play.png"/>
    <span>فيديوهات</span>
  </div>
  <div class="icon" onclick="openLinks(['https://www.facebook.com/groups/jananalia2424'])">
    <img src="https://img.icons8.com/ios-filled/100/facebook.png"/>
    <span>فيسبوك</span>
  </div>
  <div class="icon" onclick="openLinks(['https://www.google.com/search?q=gaming'])">
    <img src="https://img.icons8.com/ios-filled/100/controller.png"/>
    <span>Gaming</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/image.png"/>
    <span>صور</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/museum.png"/>
    <span>آثار</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/paint-palette.png"/>
    <span>فنون</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/home.png"/>
    <span>Accueil</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/add-user-group-man-man.png"/>
    <span>Amis</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/share.png"/>
    <span>Partage</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/plus-math.png"/>
    <span>Plus</span>
  </div>
  <div class="icon">
    <img src="https://img.icons8.com/ios-filled/100/invite.png"/>
    <span>Inviter</span>
  </div>
  <div class="icon" onclick="toggleChat()">
    <img src="https://img.icons8.com/ios-filled/100/chat.png"/>
    <span>Chat GPT</span>
  </div>
</div>

<!-- صور عائمة -->
<div class="floating-images">
  <img src="https://img.icons8.com/ios-filled/100/triangle.png"/>
  <img src="https://img.icons8.com/ios-filled/100/circle.png"/>
  <img src="https://img.icons8.com/ios-filled/100/square.png"/>
</div>

<!-- شات GPT -->
<div class="chat-box" id="chatBox" style="display:none;">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
    <button onclick="sendMessage()">إرسال</button>
  </div>
</div>

<script>
function searchGoogle() {
  const query = document.getElementById('search').value;
  if(query) window.open('https://www.google.com/search?q=' + encodeURIComponent(query));
}

function openLinks(links) {
  links.forEach(link => window.open(link, '_blank'));
}

function toggleChat() {
  const box = document.getElementById('chatBox');
  box.style.display = box.style.display === 'none' ? 'flex' : 'none';
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  addMessage('أنت: ' + msg);
  input.value = '';
  try {
    const res = await fetch('http://localhost:5000', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    addMessage('GPT: ' + data.reply);
  } catch(err) {
    addMessage('خطأ في الاتصال بالسيرفر');
  }
}

function addMessage(text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
