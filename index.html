
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📸 موقع الصور الجميلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }
    .search-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 15px;
    }
    .search-bar input {
      width: 60%;
      padding: 8px 12px;
      border-radius: 20px 0 0 20px;
      border: none;
      outline: none;
    }
    .search-bar button {
      background: #334155;
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 0 20px 20px 0;
      cursor: pointer;
    }
    .categories {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: #f1f5f9;
    }
    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #334155;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
    }
    footer {
      background: #1e293b;
      text-align: center;
      padding: 10px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام يحتوي على أجمل الصور</p>
  </header>

    <form action="https://www.google.com/search" method="get" target="_blank">
      <input type="text" name="q" placeholder="ابحث في جوجل..." />
      <button type="submit">🔍</button>
    </form>
  </div>
