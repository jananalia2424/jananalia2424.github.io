<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <m<!doctype html>
eta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📸 موقع الصور الجميلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }
    .categories {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }
    footer {
      background: #1e293b;
      text-align: center;
      padding: 10px;
      color: #94a3b8;
      margin-top: 20px;
    }
    /* نافذة من نحن */
    .about {
      max-width: 600px;
      margin: 20px auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .about h2 {
      margin-bottom: 10px;
      color: #facc15;
    }
    .about a {
      display: block;
      margin: 8px 0;
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }
    .about a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام يحتوي على أجمل الصور</p>
  </header>

  <nav class="categories">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('nature')">طبيعة</button>
    <button onclick="filter('cities')">مدن</button>
    <button onclick="filter('art')">فن</button>
    <button onclick="filter('monuments')">آثار</button>
    <button onclick="showAbout()">من نحن</button>
  </nav>

  <main id="gallery" class="grid">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="جبال">
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="مدينة">
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" data-cat="art" alt="فن">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="شلال">
  </main>

  <!-- قسم من نحن -->
  <section id="about" class="about" style="display:none;">
    <h2>من نحن</h2>
    <p>زورونا على المواقع التالية:</p>
    <a href="https://www.youtube.com/@jananalia2424" target="_blank">🎥 قناتنا على يوتيوب (1)</a>
    <a href="https://www.youtube.com/@jananalia24" target="_blank">🎥 قناتنا على يوتيوب (2)</a>
    <a href="https://www.facebook.com/groups/jananalia2424" target="_blank">🌍 قروبنا على فيسبوك</a>
  </section>

  <footer>
    © 2025 موقع الصور الجميلة — جميع الحقوق محفوظة
  </footer>

  <script>
    function filter(cat) {
      document.getElementById('about').style.display = 'none';
      document.getElementById('gallery').style.display = 'grid';
      document.querySelectorAll('#gallery img').forEach(img => {
        if (cat === 'all' || img.dataset.cat === cat) {
          img.style.display = 'block';
        } else {
          img.style.display = 'none';
        }
      });
    }
    function showAbout() {
      document.getElementById('gallery').style.display = 'none';
      document.getElementById('about').style.display = 'block';
    }
  </script>
</body>
</html>
