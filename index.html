<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>دعم — تواصل</title>
  <style>
    body{font-family: Arial,Helvetica,sans-serif;padding:18px;background:#f7f7f7;color:#111}
    .card{max-width:760px;margin:0 auto;background:#fff;padding:16px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    textarea{width:100%;box-sizing:border-box;padding:8px;border-radius:6px;border:1px solid #ddd;font-size:14px}
    button{padding:8px 14px;border-radius:6px;border:none;background:#0077ff;color:#fff;cursor:pointer}
    .messages{margin-top:12px;max-height:360px;overflow:auto;border:1px solid #eee;padding:8px;border-radius:6px;background:#fafafa}
    .msg{margin:6px 0;padding:8px;border-radius:6px}
    .me{background:#e6f0ff;text-align:right}
    .bot{background:#f1f1f1;text-align:left}
    .meta{font-size:12px;color:#666;margin-bottom:8px}
    .error{color:#b00020}
  </style>
</head>
<body>
  <div class="card">
    <h2>دعم الزوار — دردشة</h2>
    <div class="meta">الخادم: <span id="backend-url"></span></div>

    <textarea id="userInput" rows="3">سلام، هذا اختبار</textarea>
    <div style="margin-top:8px">
      <button id="sendBtn">إرسال</button>
      <span id="status" style="margin-left:12px"></span>
    </div>

    <div class="messages" id="messages" aria-live="polite"></div>
    <div id="err" class="error"></div>
  </div>

  <script>
    // --- عدّل الرابط هذا إذا خدم عندك رابط آخر ---
    const BACKEND_URL = "https://my-backend-cyj8.onrender.com";

    // عناصر
    const btn = document.getElementById("sendBtn");
    const input = document.getElementById("userInput");
    const messages = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const errEl = document.getElementById("err");
    document.getElementById("backend-url").textContent = BACKEND_URL;

    // ضمان عدم وجود دوال مكررة (لو كان عندك sendMessage في ملفات قديمة احذفها)
    if (window.sendMessage) {
      console.warn("sendMessage already defined — ensure there are no duplicate scripts.");
    }

    function appendMessage(who, text) {
      const div = document.createElement("div");
      div.className = "msg " + (who === "me" ? "me" : "bot");
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function setLoading(loading) {
      btn.disabled = loading;
      statusEl.textContent = loading ? "جارٍ الإرسال..." : "";
    }

    function showError(text) {
      errEl.textContent = text;
    }

    async function sendMessage() {
      errEl.textContent = "";
      const message = input.value?.trim();
      if (!message) return showError("الرجاء كتابة رسالة.");

      appendMessage("me", message);
      setLoading(true);

      try {
        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        if (!res.ok) {
          // اقرأ النص الكامل للخطأ لو كان متاح
          const text = await res.text();
          showError(`خطأ من الخادم: ${res.status} ${res.statusText} — ${text}`);
          return;
        }

        const data = await res.json();
        const reply = data.reply ?? "(لا يوجد رد)";
        appendMessage("bot", reply);
      } catch (e) {
        // عادة مشاكل شبكة أو CORS
        showError(`خطأ في الاتصال: ${e.message}`);
        console.error(e);
      } finally {
        setLoading(false);
      }
    }

    // حدث الإرسال
    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) sendMessage(); });
  </script>
</body>
</html>
