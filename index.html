<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>موقعي - دعم شات جي بي تي</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fdfdfd;
      margin: 0;
      padding: 0;
    }
    header {
      background: #0099cc;
      padding: 20px;
      text-align: center;
      color: #fff;
    }
    nav {
      background: #eee;
      padding: 10px;
      text-align: center;
    }
    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
    }
    .container {
      padding: 20px;
    }
    /* ستايل الشات */
    #chatBox {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      width: 100%;
      height: 250px;
      overflow-y: auto;
      background: #fff;
      margin-top: 20px;
    }
    #chatInput {
      width: 80%;
      padding: 8px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #sendBtn {
      padding: 8px 12px;
      margin-top: 10px;
      background: #0099cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #sendBtn:hover {
      background: #0077aa;
    }
    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>مرحبا بك في موقعي</h1>
  </header>

  <nav>
    <a href="#">الرئيسية</a>
    <a href="#">صور</a>
    <a href="#">من نحن</a>
    <a href="#">اتصل بنا</a>
    <!-- محرك البحث -->
    <form action="https://www.google.com/search" method="get" target="_blank" style="display:inline;">
      <input type="text" name="q" placeholder="ابحث في جوجل..." />
      <button type="submit">بحث</button>
    </form>
  </nav>

  <div class="container">
    <h2>مرحبا بك!</h2>
    <p>هذا هو الموقع الخاص بك. يمكنك تصفح الصور والمعلومات، وتجربة شات جي بي تي المدمج أدناه.</p>

    <!-- ✅ صندوق الشات -->
    <h3>شات جي بي تي (فريق الدعم)</h3>
    <div id="chatBox">
      <div id="chatMessages"></div>
    </div>
    <input id="chatInput" type="text" placeholder="اكتب رسالتك هنا..." />
    <button id="sendBtn" onclick="sendChatMessage()">إرسال</button>
  </div>

  <footer>
    <p>© 2025 جميع الحقوق محفوظة</p>
  </footer>

  <script>
    async function sendChatMessage() {
      const input = document.getElementById("chatInput");
      const chatBox = document.getElementById("chatMessages");

      const userMsg = input.value.trim();
      if (!userMsg) return;

      // عرض رسالة المستخدم
      chatBox.innerHTML += `<p><b>أنت:</b> ${userMsg}</p>`;

      // إرسال الرسالة للسيرفر
      try {
        const response = await fetch("https://my-backend.onrender.com/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMsg })
        });

        const data = await response.json();

        // عرض رد شات جي بي تي
        chatBox.innerHTML += `<p><b>شات جي بي تي:</b> ${data.reply}</p>`;
      } catch (error) {
        chatBox.innerHTML += `<p style="color:red"><b>خطأ:</b> تعذر الاتصال بالسيرفر</p>`;
      }

      input.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
