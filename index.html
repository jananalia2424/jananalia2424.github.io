<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Gallery Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    header {
      background: #222;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
      color: #f0db4f;
    }
    nav a {
      margin: 0 10px;
      color: #fff;
      text-decoration: none;
    }
    nav a:hover {
      color: #f0db4f;
    }
    .search-box {
      display: flex;
      align-items: center;
    }
    .search-box input {
      padding: 5px;
      border: none;
      border-radius: 4px 0 0 4px;
      outline: none;
    }
    .search-box button {
      padding: 6px 10px;
      border: none;
      background: #f0db4f;
      cursor: pointer;
      border-radius: 0 4px 4px 0;
    }
    section {
      padding: 20px;
    }
    h2 {
      margin-top: 0;
      color: #f0db4f;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
      gap: 15px;
    }
    .gallery img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    .card {
      background: #222;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }
    .card a {
      color: #f0db4f;
      text-decoration: none;
      font-weight: bold;
    }
    footer {
      background: #222;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Gallery Website</h1>
    <nav>
      <a href="#nature">Nature</a>
      <a href="#cities">Cities</a>
      <a href="#art">Art</a>
      <a href="#heritage">Heritage</a>
      <a href="#about">About Us</a>
    </nav>
    <div class="search-box">
      <form action="https://www.google.com/search" method="get" target="_blank">
        <input type="text" name="q" placeholder="Search on Google...">
        <button type="submit">🔍</button>
      </form>
    </div>
  </header>

  <section id="nature">
    <h2>Nature</h2>
    <div class="gallery">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Moraine_Lake_17092005.jpg" alt="Moraine Lake"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/17/Grand_Canyon_view_from_Pima_Point_2010.jpg" alt="Grand Canyon"/>
    </div>
  </section>

  <section id="cities">
    <h2>Cities</h2>
    <div class="gallery">
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/14/Budapest_Hungary_Parliament.jpg" alt="Budapest"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e9/Bucharest_Romania_Palace_of_Parliament.jpg" alt="Bucharest"/>
    </div>
  </section>

  <section id="art">
    <h2>Art</h2>
    <div class="card">
      <p>Visit my YouTube channels:</p>
      <p><a href="https://www.youtube.com/@jananalia2424" target="_blank">YouTube Channel 1</a></p>
      <p><a href="https://www.youtube.com/@jananalia24" target="_blank">YouTube Channel 2</a></p>
    </div>
  </section>

  <section id="heritage">
    <h2>Heritage</h2>
    <div class="gallery">
      <!-- بعض المواقع الأثرية العالمية -->
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Colosseum_in_Rome%2C_Italy_-_April_2007.jpg" alt="Colosseum, Rome"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a1/Acropolis_of_Athens_2019.jpg" alt="Acropolis, Athens"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Machu_Picchu%2C_Peru.jpg" alt="Machu Picchu"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/f0/Petra_Jordan_BW_21.JPG" alt="Petra, Jordan"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Taj_Mahal_in_March_2004.jpg" alt="Taj Mahal"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/01/Great_Wall_of_China_July_2006.JPG" alt="Great Wall of China"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Egyptian_Pyramids_of_Giza.jpg" alt="Pyramids of Giza"/>
      <img src="https://upload.wikimedia.org/wikipedia/commons/d/de/Stonehenge2007_07_30.jpg" alt="Stonehenge"/>
    </div>
  </section>

  <section id="about">
    <h2>About Us</h2>
    <div class="card">
      <p>Visit us on the following platforms:</p>
      <p><a href="https://www.youtube.com/@jananalia2424" target="_blank">YouTube Channel 1</a></p>
      <p><a href="https://www.youtube.com/@jananalia24" target="_blank">YouTube Channel 2</a></p>
      <p><a href="https://www.facebook.com/groups/jananalia2424" target="_blank">Facebook Group</a></p>
    </div>
  </section>

  <footer>
    <p>© 2025 My Gallery Website</p>
  </footer>
</body>
</html>
