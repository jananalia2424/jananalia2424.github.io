<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>بوابة Jananalia — الصفحة الرئيسية</title>
<style>
:root{
  --brick:#8B2F2F; /* Rouge Brique */
  --dark:#222;
  --white:#fff;
  --black:#000;
  --red:#FF3B3B;
  --orange:#FF7F50;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Cairo","Tajawal",sans-serif;
  background:var(--dark);
  color:var(--white);
  min-height:100vh;
  direction:rtl;
}

/* HEADER / SEARCH */
header{
  position:sticky; top:0; z-index:50;
  display:flex; justify-content:center; align-items:center;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.6);
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.search-wrap{
  width:100%; max-width:980px; display:flex; gap:8px;
}
.search-input{
  flex:1; padding:12px 16px; border-radius:999px;
  border:1px solid rgba(255,255,255,0.3);
  outline:none; font-size:15px; text-align:right;
  background: rgba(255,255,255,0.85); color:#222;
}
.search-btn{
  width:48px; height:48px; border-radius:50%; border:none;
  background: linear-gradient(180deg,var(--brick),var(--red));
  color:white; font-size:20px; cursor:pointer;
  display:flex; justify-content:center; align-items:center;
  box-shadow:0 6px 14px rgba(0,0,0,0.4);
}

/* QUICK LINKS */
.quick-links{
  display:none; text-align:center; margin:8px auto; max-width:1100px;
}
.quick-links a{
  display:inline-block; margin:6px 8px; padding:8px 12px;
  background:var(--white); color:var(--brick);
  text-decoration:none; border-radius:8px; font-weight:600;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* GRID CARDS */
main{padding:28px 16px 120px;}
.cards{
  display:flex; flex-wrap:wrap; gap:16px; justify-content:center;
}
.card{
  position:relative; width:180px; height:160px;
  border-radius:14px; display:flex; flex-direction:column;
  justify-content:space-between; padding:14px;
  cursor:pointer; overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  transition:0.22s;
}
.card:hover{transform:translateY(-6px); box-shadow:0 18px 40px rgba(0,0,0,0.6);}
.card .title{ font-size:18px; font-weight:700; }
.card .subtitle{ font-size:13px; opacity:0.95; }

/* كل بطاقة لون مختلف */
.c-accueil{ background: linear-gradient(135deg,var(--white),var(--brick)); color:var(--dark);}
.c-photos{ background: linear-gradient(135deg,var(--red),var(--black)); }
.c-artifacts{ background: linear-gradient(135deg,var(--orange),var(--brick)); }
.c-arts{ background: linear-gradient(135deg,var(--white),var(--red)); color:var(--black);}
.c-about{ background: linear-gradient(135deg,var(--brick),var(--orange)); }
.c-video{ background: linear-gradient(135deg,var(--red),var(--orange)); }
.c-gaming{ background: linear-gradient(135deg,var(--dark),var(--brick)); }
.c-amis{ background: linear-gradient(135deg,var(--white),var(--black)); color:var(--brick);}
.c-partage{ background: linear-gradient(135deg,var(--orange),var(--red)); }
.c-invite{ background: linear-gradient(135deg,var(--brick),var(--white)); color:var(--dark);}
.c-plus{ background: linear-gradient(135deg,var(--red),var(--dark)); }
.c-chat{ background: linear-gradient(135deg,var(--orange),var(--brick)); }

/* صور داخل البطاقة */
.card .card-img{
  position:absolute; left:8px; bottom:8px;
  width:80px; height:80px;
  border-radius:10px; opacity:0.15; object-fit:cover;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
}

/* CHAT MESSENGER */
#messengerIcon{
  position:fixed; bottom:18px; right:18px;
  width:62px; height:62px; border-radius:50%;
  background:linear-gradient(180deg,var(--brick),var(--red));
  color:white; font-size:26px; display:flex;
  justify-content:center; align-items:center;
  cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:80;
}
#messengerChat{
  position:fixed; right:18px; bottom:92px;
  width:360px; max-width:90vw; height:460px;
  background:var(--white); color:var(--dark);
  border-radius:12px; display:none; flex-direction:column;
  overflow:hidden; z-index:80; box-shadow:0 18px 60px rgba(0,0,0,0.5);
}
#messengerChat .head{ background:var(--brick); color:white; padding:12px; font-weight:700; display:flex; justify-content:space-between;}
#messengerBody{ flex:1; padding:12px; overflow:auto; background:var(--black); color:var(--white);}
#messengerInput{ flex:1; padding:8px 10px; border-radius:8px; border:1px solid #ccc; outline:none;}
#sendBtn{ padding:8px 12px; border-radius:8px; background:var(--brick); color:white; border:none; cursor:pointer; margin-left:4px;}

/* Bubbles */
.bubble{ margin:6px 0; padding:8px 10px; border-radius:12px; max-width:75%; }
.userBubble{ background:var(--red); color:white; margin-left:auto;}
.botBubble{ background:var(--white); color:var(--dark); margin-right:auto;}
</style>
</head>

<div id="quickLinks" class="quick-links">

<section class="cards">

  <div class="card c-invite"><div><div class="title">✉️ دعوة</div><div class="subtitle">Invite</div></div><img class="card-img" src="https://picsum.photos/seed/invite/400/300" alt=""></div>
  <div class="card c-plus"><div><div class="title">➕ المزيد</div><div class="subtitle">Plus</div></div><img class="card-img" src="https://picsum.photos/seed/plus/400/300" alt=""></div>

  <div style="display:flex;padding:8px;background:#eee;">
    <input id="messengerInput" placeholder="اكتب رسالتك هنا..." />
    <button id="sendBtn">إرسال</button>
  </div>
</div>

<script>
// البحث
document.getElementById('searchBtn').addEventListener('click',()=>{
  const q=document.getElementById('searchInput').value;
  if(q) window.open('https://www.google.com/search?q='+encodeURIComponent(q),'_blank');
});

// Quick links toggle
document.getElementById('searchInput').addEventListener('focus',()=>{document.getElementById('quickLinks').style.display='block';});
document.getElementById('searchInput').addEventListener('blur',()=>{setTimeout(()=>{document.getElementById('quickLinks').style.display='none';},200);});

// Messenger Chat
const messengerIcon=document.getElementById('messengerIcon');
