<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الدعم الفوري</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; }
    #chat { max-width: 600px; margin: 40px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .msg { margin: 10px 0; padding: 10px; border-radius: 6px; }
    .user { background: #d1ecf1; text-align: left; }
    .bot { background: #f8d7da; text-align: right; }
    #form { display: flex; margin-top: 15px; }
    #form input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    #form button { padding: 10px 20px; margin-left: 10px; border: none; border-radius: 6px; background: #007bff; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div id="chat">
    <div id="messages"></div>
    <form id="form">
      <input id="input" type="text" placeholder="اكتب رسالتك هنا..." required />
      <button type="submit">إرسال</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, "user");
      input.value = "";

      try {
        const resp = await fetch("https://your-backend.onrender.com/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await resp.json();
        addMessage(data.reply || "⚠️ خطأ في الاتصال بالخادم.", "bot");
      } catch (err) {
        addMessage("⚠️ خطأ في الاتصال بالخادم.", "bot");
      }
    });
  </script>
</body>
</html>
