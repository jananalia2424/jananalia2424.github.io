<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي العصري</title>
  <style>
    body {
      font-family: "Tahoma", Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: #2d89ef;
      padding: 15px;
      text-align: center;
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .search-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 15px auto;
      max-width: 400px;
      background: #fff;
      border-radius: 30px;
      padding: 5px 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 8px 12px;
      border-radius: 30px;
      font-size: 14px;
    }
    .search-bar button {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      color: #2d89ef;
    }
    .title {
      text-align: center;
      margin: 20px 10px;
      font-size: 20px;
      font-weight: bold;
      color: #2d2d2d;
    }
    .icons {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 20px;
    }
    .icon {
      text-align: center;
      cursor: pointer;
    }
    .icon span {
      display: block;
      font-size: 30px;
      margin-bottom: 5px;
    }
    .icon p {
      font-size: 14px;
      margin: 0;
    }
    .chat-container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .messages {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user {
      background: #e1f5fe;
      text-align: right;
    }
    .bot {
      background: #f1f8e9;
      text-align: left;
    }
    .bot::before {
      content: "💬 فريق الدعم: ";
      font-weight: bold;
      color: #2d7a0b;
    }
    .input-box {
      display: flex;
      gap: 10px;
    }
    .input-box input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .input-box button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #2d89ef;
      color: #fff;
      cursor: pointer;
    }
    .input-box button:hover {
      background: #1b5cb8;
    }
    footer {
      background: #2d89ef;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 30px;
    }
    footer a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- ✅ صندوق الشات -->
<div id="chatbox" style="border:1px solid #ccc; padding:10px; width:300px; margin:20px auto; border-radius:10px;">
  <div id="messages" style="height:200px; overflow-y:auto; margin-bottom:10px;"></div>
  <input type="text" id="userInput" placeholder="اكتب رسالتك..." style="width:70%; padding:5px;">
  <button onclick="sendMessage()" style="width:25%; padding:5px;">إرسال</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value;
  if (!message) return;

  // نعرض رسالة المستخدم
  document.getElementById("messages").innerHTML += `<p><b>أنت:</b> ${message}</p>`;

  // نبعث الرسالة للسيرفر
  const response = await fetch("http://localhost:5000/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await response.json();

  // نعرض جواب السيرفر
  document.getElementById("messages").innerHTML += `<p><b>الدعم:</b> ${data.reply}</p>`;

  input.value = "";
}
</script>
