<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>صفحتي</title>
  <style>
    body {
      margin: 0;
      font-family: "Tahoma", sans-serif;
      background: linear-gradient(to bottom, #a8e6cf, #dcedc1, #ffd3b6);
      color: #333;
      text-align: center;
    }

    /* 🔍 محرك البحث */
    .search-container {
      margin: 20px auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .search-container input {
      width: 300px;
      padding: 10px;
      border: 2px solid #4caf50;
      border-radius: 25px 0 0 25px;
      outline: none;
    }
    .search-container button {
      padding: 10px 15px;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 0 25px 25px 0;
      cursor: pointer;
    }

    /* 🖼️ الأيقونات */
    .icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px;
    }
    .icon {
      width: 150px;
      height: 150px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform 0.3s;
    }
    .icon:hover {
      transform: scale(1.05);
    }
    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .icon-label {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 5px;
      font-size: 14px;
    }

    /* 📌 المحتوى داخل الأيقونة */
    .content {
      display: none;
      margin: 20px auto;
      max-width: 800px;
      background: rgba(255,255,255,0.9);
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .content img {
      width: 120px;
      margin: 5px;
      border-radius: 10px;
    }
    .links a {
      display: block;
      margin: 10px;
      text-decoration: none;
      color: #4caf50;
      font-weight: bold;
    }

    /* 🤖 أيقونة الدعم */
    .chat-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0084ff;
      color: white;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .chat-box {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      overflow: hidden;
      flex-direction: column;
    }
    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    .chat-input {
      display: flex;
    }
    .chat-input input {
      flex: 1;
      padding: 8px;
      border: none;
      border-top: 1px solid #ddd;
      outline: none;
    }
    .chat-input button {
      padding: 8px 12px;
      border: none;
      background: #0084ff;
      color: white;
      cursor: pointer;
    }

    /* 🎨 أسفل الصفحة */
    footer {
      margin-top: 40px;
      padding: 20px;
      background: #f7f7f7;
    }
    footer img {
      width: 100px;
      margin: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- 🔍 محرك البحث -->
  <div class="search-container">
    <form action="https://www.google.com/search" method="GET" target="_blank">
      <input type="text" name="q" placeholder="ابحث في جوجل...">
      <button type="submit">🔍</button>
    </form>
  </div>

  <!-- 🖼️ الأيقونات -->
  <div class="icons">
    <div class="icon" onclick="toggleContent('photos')">
      <img src="https://source.unsplash.com/150x150/?nature" alt="">
      <div class="icon-label">📷 صور</div>
    </div>
    <div class="icon" onclick="toggleContent('history')">
      <img src="https://source.unsplash.com/150x150/?ruins" alt="">
      <div class="icon-label">🏛️ آثار</div>
    </div>
    <div class="icon" onclick="toggleContent('art')">
      <img src="https://source.unsplash.com/150x150/?art" alt="">
      <div class="icon-label">🎨 فنون</div>
    </div>
    <div class="icon" onclick="toggleContent('about')">
      <img src="https://source.unsplash.com/150x150/?team" alt="">
      <div class="icon-label">ℹ️ من نحن</div>
    </div>
  </div>

  <!-- 📌 محتوى الأيقونات -->
  <div id="photos" class="content">
    <h3>📷 صور رائعة</h3>
    <img src="https://source.unsplash.com/120x120/?spring" alt="">
    <img src="https://source.unsplash.com/120x120/?flowers" alt="">
    <img src="https://source.unsplash.com/120x120/?forest" alt="">
  </div>

  <div id="history" class="content">
    <h3>🏛️ صور آثار</h3>
    <img src="https://source.unsplash.com/120x120/?pyramid" alt="">
    <img src="https://source.unsplash.com/120x120/?temple" alt="">
    <img src="https://source.unsplash.com/120x120/?ancient" alt="">
  </div>

  <div id="art" class="content">
    <h3>🎨 فنون عالمية</h3>
    <img src="https://source.unsplash.com/120x120/?painting" alt="">
    <img src="https://source.unsplash.com/120x120/?pencil-drawing" alt="">
    <img src="https://source.unsplash.com/120x120/?museum" alt="">
  </div>

  <div id="about" class="content">
    <h3>ℹ️ من نحن</h3>
    <div class="links">
      <a href="https://youtube.com" target="_blank">📺 قناة يوتيوب الأولى</a>
      <a href="https://youtube.com" target="_blank">📺 قناة يوتيوب الثانية</a>
      <a href="https://facebook.com" target="_blank">👥 قروب فيسبوك</a>
    </div>
  </div>

  <!-- 🤖 شات الدعم -->
  <div class="chat-icon" onclick="toggleChat()">💬</div>
  <div class="chat-box" id="chatBox">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <!-- 🎨 أسفل الصفحة -->
  <footer>
    <h3>🖼️ قطع أثرية ورسوم للأطفال</h3>
    <img src="https://source.unsplash.com/100x100/?artifact" alt="">
    <img src="https://source.unsplash.com/100x100/?ancient" alt="">
    <img src="https://source.unsplash.com/100x100/?cartoon" alt="">
    <img src="https://source.unsplash.com/100x100/?kids-drawing" alt="">
  </footer>

  <script>
    function toggleContent(id) {
      document.querySelectorAll('.content').forEach(c => c.style.display = "none");
      document.getElementById(id).style.display = "block";
    }

    function toggleChat() {
      const box = document.getElementById("chatBox");
      box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const msg = input.value.trim();
      if (!msg) return;
      const messages = document.getElementById("chatMessages");
      messages.innerHTML += `<div><b>أنت:</b> ${msg}</div>`;
      input.value = "";

      try {
        const res = await fetch("http://localhost:5000/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        messages.innerHTML += `<div><b>GPT:</b> ${data.reply}</div>`;
        messages.scrollTop = messages.scrollHeight;
      } catch (e) {
        messages.innerHTML += `<div style="color:red"><b>خطأ:</b> لم يتم الاتصال بالسيرفر</div>`;
      }
    }
  </script>
</body>
</html>
