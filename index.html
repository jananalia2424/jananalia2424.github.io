<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📸 موقع الصور الجميلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }
    .search-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px;
      flex-wrap: wrap;
    }
    .search-bar input {
      padding: 6px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }
    .search-bar button {
      background: #dc2626;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
    .categories {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: #f1f5f9;
    }
    .card h3 {
      margin: 10px 0;
    }
    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #dc2626;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
    }
    footer {
      background: #1e293b;
      text-align: center;
      padding: 10px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام يحتوي على أجمل الصور</p>
  </header>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="ابحث عن صورة...">
    <button onclick="searchImages()">بحث</button>
    <form action="https://www.google.com/search" method="get" target="_blank">
      <input type="text" name="q" placeholder="ابحث في Google">
      <button type="submit">🔍 Google</button>
    </form>
  </div>

  <nav class="categories">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('nature')">طبيعة</button>
    <button onclick="filter('cities')">مدن</button>
    <button onclick="filter('art')">فن</button>
    <button onclick="filter('history')">آثار</button>
  </nav>

  <main class="grid" id="gallery">
    <!-- طبيعة -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="جبال">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="شلال">

    <!-- مدن -->
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="مدينة">
    <img src="https://images.unsplash.com/photo-1470123808288-1e59739cf8da?q=80&w=800" data-cat="cities" alt="بودابست">
    <img src="https://images.unsplash.com/photo-1526481280698-8fccaaeeef1e?q=80&w=800" data-cat="cities" alt="بخارست">

    <!-- آثار -->
    <img src="https://images.unsplash.com/photo-1586528116315-e3a1f820e4cb?q=80&w=800" data-cat="history" alt="مدرج روماني">
    <img src="https://images.unsplash.com/photo-1587486913049-8c0f5e6e3a5c?q=80&w=800" data-cat="history" alt="أطلال قديمة">

    <!-- فن = قنوات -->
    <div class="card" data-cat="art">
      <h3>🎨 قناتي على يوتيوب</h3>
      <p>@jananalia2424</p>
      <a href="https://www.youtube.com/@jananalia2424" target="_blank">زيارة القناة</a>
    </div>
    <div class="card" data-cat="art">
      <h3>🎨 قناتي على يوتيوب</h3>
      <p>@jananalia24</p>
      <a href="https://www.youtube.com/@jananalia24" target="_blank">زيارة القناة</a>
    </div>
  </main>

  <footer>
    © 2025 موقع الصور الجميلة — جميع الحقوق محفوظة
  </footer>

  <script>
    function filter(cat) {
      document.querySelectorAll('#gallery > *').forEach(el => {
        if (cat === 'all' || el.dataset.cat === cat) {
          el.style.display = 'block';
        } else {
          el.style.display = 'none';
        }
      });
    }
    function searchImages() {
      let term = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll('#gallery img').forEach(img => {
        if (img.alt.toLowerCase().includes(term)) {
          img.style.display = 'block';
        } else {
          img.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
