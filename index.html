<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📸 موقع الصور الجميلة — معرض (نسخة كاملة)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Cairo', sans-serif; background: #0f172a; color: #f1f5f9; }
    header { background: #1e293b; padding: 15px; text-align: center; }
    header h1 { margin: 0; }
    .search-box { position: relative; width: 90%; max-width:900px; margin: 15px auto; }
    .search-box input { width: 100%; padding: 10px 40px 10px 12px; border-radius: 8px; border: none; outline: none; }
    .search-box span { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size:18px; }
    .categories { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:15px 0; }
    .categories button { background:#334155; border:none; color:#f1f5f9; padding:8px 16px; border-radius:20px; cursor:pointer; transition:background .25s; }
    .categories button.active, .categories button:hover { background:#0ea5e9; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:12px; padding:15px; }
    .grid img { width:100%; height:160px; object-fit:cover; border-radius:10px; cursor:pointer; transition:transform .25s; }
    .grid img:hover { transform:scale(1.04); }
    footer { background:#1e293b; text-align:center; padding:12px; color:#94a3b8; margin-top:20px; }
    /* Lightbox */
    .lightbox { display:none; position:fixed; z-index:9999; inset:0; background:rgba(0,0,0,0.88); justify-content:center; align-items:center; }
    .lightbox img { max-width:92%; max-height:86%; border-radius:10px; box-shadow:0 6px 30px rgba(0,0,0,0.6); }
    /* responsive tweaks */
    @media (max-width:600px){ .grid img{ height:140px } .search-box { width:95% } }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>نسخة كاملة — جميع الصور محفوظة، الإضافات: بحث، لايتبوكس، وتأثيرات</p>
  </header>

  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 ابحث عن صورة (مثال: بودابست، تيمقاد، آثار)">
    <span>🔍</span>
  </div>

  <nav class="categories">
    <button class="active" onclick="filter('all', this)">الكل</button>
    <button onclick="filter('nature', this)">طبيعة</button>
    <button onclick="filter('cities', this)">مدن</button>
    <button onclick="filter('art', this)">فن</button>
    <button onclick="filter('heritage', this)">آثار</button>
  </nav>

  <main class="grid" id="gallery">
    <!-- محفوظات من النسخة القديمة -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" loading="lazy" data-cat="nature" data-title="جبال" alt="جبال">
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" loading="lazy" data-cat="cities" data-title="مدينة" alt="مدينة">
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=800" loading="lazy" data-cat="art" data-title="فن" alt="فن">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" loading="lazy" data-cat="nature" data-title="شلال" alt="شلال">

    <!-- آثار محفوظة -->
