<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي العصري</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      direction: rtl;
      text-align: center;
    }
    header {
      background: #333;
      color: #fff;
      padding: 15px;
    }
    nav {
      margin: 10px 0;
    }
    nav button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      background: #444;
      color: #fff;
      cursor: pointer;
      border-radius: 5px;
    }
    nav button:hover {
      background: #666;
    }
    .search-bar {
      margin: 20px 0;
    }
    .search-bar input {
      padding: 10px;
      width: 70%;
      max-width: 400px;
    }
    .search-bar button {
      padding: 10px 15px;
      cursor: pointer;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 20px;
    }
    .gallery img {
      width: 250px;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .youtube-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .youtube-card h2 {
      margin: 0 0 10px;
    }
    .youtube-card a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: red;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }
    .youtube-card a:hover {
      background: darkred;
    }
  </style>
</head>
<body>
  <header>
    <h1>موقعي العصري ✨</h1>
  </header>

  <nav>
    <button onclick="showCategory('nature')">🌿 طبيعة</button>
    <button onclick="showCategory('cities')">🏙 مدن</button>
    <button onclick="showCategory('art')">🎨 فن</button>
    <button onclick="showCategory('history')">🏺 آثار</button>
  </nav>

  <div class="search-bar">
    <form action="https://www.google.com/search" method="get" target="_blank">
      <input type="text" name="q" placeholder="ابحث في جوجل...">
      <button type="submit">🔍 بحث</button>
    </form>
  </div>

  <div id="content">
    <!-- طبيعة -->
    <div class="gallery" data-cat="nature">
      <img src="https://source.unsplash.com/250x180/?nature,forest" alt="طبيعة">
      <img src="https://source.unsplash.com/250x180/?nature,water" alt="طبيعة">
      <img src="https://source.unsplash.com/250x180/?mountain" alt="طبيعة">
    </div>

    <!-- مدن -->
    <div class="gallery" data-cat="cities" style="display:none;">
      <img src="https://source.unsplash.com/250x180/?city" alt="مدينة">
      <img src="https://source.unsplash.com/250x180/?buildings" alt="مدينة">
      <img src="https://source.unsplash.com/250x180/?street" alt="مدينة">
    </div>

    <!-- فن (قنوات يوتيوب) -->
    <div class="youtube-card" data-cat="art" style="display:none;">
      <h2>🎨 قناتي على يوتيوب</h2>
      <p>تابعوني على قناتي الأولى</p>
      <a href="https://www.youtube.com/@jananalia2424" target="_blank">زيارة القناة الأولى</a>
    </div>

    <div class="youtube-card" data-cat="art" style="display:none;">
      <h2>🎨 قناتي على يوتيوب</h2>
      <p>تابعوني على قناتي الثانية</p>
      <a href="https://www.youtube.com/@jananalia24" target="_blank">زيارة القناة الثانية</a>
    </div>

    <!-- آثار -->
    <div class="gallery" data-cat="history" style="display:none;">
      <img src="https://source.unsplash.com/250x180/?ruins" alt="أثر">
      <img src="https://source.unsplash.com/250x180/?pyramid" alt="أثر">
      <img src="https://source.unsplash.com/250x180/?temple" alt="أثر">
    </div>
  </div>

  <script>
    function showCategory(cat) {
      document.querySelectorAll('#content > div').forEach(div => {
        div.style.display = (div.getAttribute('data-cat') === cat) ? 'flex' : 'none';
      });
    }
  </script>
</body>
</html>
