<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>موقعي مع فريق الدعم</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    /* صندوق الشات */
    #chat-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      max-height: 400px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    .message {
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
    }
    .user {
      background: #e0f7fa;
      text-align: left;
    }
    .bot {
      background: #f1f8e9;
      text-align: right;
    }
    #chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }
    #chat-input input {
      flex: 1;
      padding: 8px;
      border: none;
      outline: none;
    }
    #chat-input button {
      padding: 8px 12px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    #chat-input button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <header>
    <h1>مرحبا بك في موقعي 🌐</h1>
    <p>هنا تلقى فريق الدعم يجاوبك مباشرة</p>
  </header>

  <!-- صندوق المحادثة -->
  <div id="chat-container">
    <div id="chat-messages"></div>
    <div id="chat-input">
      <input type="text" id="userInput" placeholder="اكتب رسالتك..." />
      <button onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    const API_URL = "https://my-backend-cyj8.onrender.com/api/chat";

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await response.json();
        addMessage(data.reply, "bot");
      } catch (err) {
        addMessage("⚠️ خطأ في الاتصال بالسيرفر", "bot");
      }
    }

    function addMessage(text, sender) {
      const chatMessages = document.getElementById("chat-messages");
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  </script>
</body>
</html>
