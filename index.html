<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي مع شات جي بي تي</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      text-align: right;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      width: 100%;
      max-width: 600px;
      margin: 50px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .messages {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }
    .message {
      margin: 5px 0;
    }
    .user {
      color: blue;
    }
    .bot {
      color: green;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
    }
    input {
      width: 70%;
    }
    button {
      width: 25%;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <h2>💬 فريق الدعم (شات جي بي تي)</h2>
    <div id="messages" class="messages"></div>
    <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." />
    <button onclick="sendMessage()">إرسال</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const messagesDiv = document.getElementById("messages");

      if (!input.value.trim()) return;

      // عرض رسالة المستخدم
      const userMsg = document.createElement("div");
      userMsg.className = "message user";
      userMsg.innerText = "👤 أنت: " + input.value;
      messagesDiv.appendChild(userMsg);

      // إرسال للسيرفر (Render)
      try {
        const response = await fetch("https://my-backend-cyj8.onrender.com/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: input.value })
        });

        const data = await response.json();

        // عرض رد البوت
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerText = "🤖 البوت: " + (data.reply || "⚠️ لم يصل رد من السيرفر.");
        messagesDiv.appendChild(botMsg);

      } catch (err) {
        const errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.innerText = "⚠️ خطأ: تعذر الاتصال بالسيرفر.";
        messagesDiv.appendChild(errorMsg);
      }

      // تنظيف حقل الإدخال
      input.value = "";
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
