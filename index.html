      margin: 0;
    }
    .chat-container {

      background: #fff;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .messages {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user {

      text-align: right;
    }
    .bot {

      text-align: left;
    }

      border-radius: 8px;

      border: none;
      border-radius: 8px;
      background: #2d89ef;
      color: #fff;

    }
    .input-box button:hover {

    }
    footer {
      background: #2d89ef;

    }
    footer a {
      color: #fff;
      text-decoration: none;
