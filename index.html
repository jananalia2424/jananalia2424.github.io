<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
      background: #fdfdfd;
      color: #333;
    }

    header {
      background: linear-gradient(90deg, #3498db, #f1c40f);
      color: #fff;
      padding: 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    nav {
      background: #fff;
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 10px;
      border-bottom: 2px solid #eee;
    }

    nav a {
      text-decoration: none;
      color: #2c3e50;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
    }

    nav a:hover {
      background: #3498db;
      color: #fff;
    }

    /* محرك البحث */
    .search-bar {
      display: flex;
      justify-content: center;
      margin: 15px;
    }

    .search-bar input {
      padding: 8px;
      width: 250px;
      border: 2px solid #ccc;
      border-radius: 20px 0 0 20px;
      outline: none;
    }

    .search-bar button {
      padding: 8px 12px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 0 20px 20px 0;
      cursor: pointer;
    }

    .search-bar button:hover {
      background: #1d6fa5;
    }

    main {
      padding: 2rem;
      min-height: 70vh;
    }

    section {
      margin-bottom: 2rem;
    }

    section h2 {
      color: #2c3e50;
      border-bottom: 3px solid #f1c40f;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      background: #2c3e50;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }

    footer a {
      color: #f1c40f;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* صندوق المحادثة */
    #chat-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      max-height: 500px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
    }

    #chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      margin: 5px 0;
      padding: 8px 12px;
      border-radius: 15px;
      max-width: 80%;
      clear: both;
    }

    .user {
      background: #3498db;
      color: #fff;
      margin-left: auto;
      text-align: left;
    }

    .bot {
      background: #ecf0f1;
      color: #333;
      margin-right: auto;
      text-align: left;
    }

    #chat-form {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #chat-input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #send-btn {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }

    #send-btn:hover {
      background: #1a242f;
    }
  </style>
</head>
<body>
  <header>
    <h1>مرحبا بك في موقعي</h1>
  </header>

  <!-- محرك البحث -->
  <div class="search-bar">
    <form action="https://www.google.com/search" method="get" target="_blank">
      <input type="text" name="q" placeholder="ابحث في جوجل..." required>
      <button type="submit">🔍</button>
    </form>
  </div>

  <!-- القائمة -->
  <nav>
    <a href="#about">من نحن</a>
    <a href="#athar">الآثار</a>
    <a href="#images">الصور</a>
    <a href="#art">الفنون</a>
  </nav>

  <main>
    <section id="about">
      <h2>من نحن</h2>
      <p>نحن فريق مهتم بمشاركة المعرفة والجمال عبر موقعنا. هدفنا هو نشر الطاقة الإيجابية وإثراء التجربة البصرية.</p>
    </section>

    <section id="athar">
      <h2>الآثار</h2>
      <div class="gallery">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Pyramids_of_Egypt_2006.jpg" alt="أهرامات مصر">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Roman_Colosseum.jpg" alt="الكولوسيوم">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Petra_Jordan_BW_21.JPG" alt="البتراء">
      </div>
    </section>

    <section id="images">
      <h2>الصور</h2>
      <div class="gallery">
        <img src="https://picsum.photos/400/250?random=1" alt="صورة عشوائية">
        <img src="https://picsum.photos/400/250?random=2" alt="صورة عشوائية">
        <img src="https://picsum.photos/400/250?random=3" alt="صورة عشوائية">
      </div>
    </section>

    <section id="art">
      <h2>الفنون</h2>
      <div class="gallery">
        <img src="https://uploads7.wikiart.org/images/vincent-van-gogh/starry-night.jpg" alt="لوحة ليلة النجوم - فان غوخ">
        <img src="https://uploads7.wikiart.org/images/leonardo-da-vinci/mona-lisa.jpg" alt="الموناليزا - دافنشي">
        <img src="https://uploads0.wikiart.org/images/pablo-picasso/guernica.jpg" alt="غيرنيكا - بيكاسو">
      </div>
    </section>
  </main>

  <footer>
    <p>تابعونا على:</p>
    <a href="https://youtube.com" target="_blank">📺 قناة يوتيوب 1</a> |
    <a href="https://youtube.com" target="_blank">📺 قناة يوتيوب 2</a> |
    <a href="https://facebook.com" target="_blank">📘 مجموعتنا على فيسبوك</a>
    <p>© 2025 جميع الحقوق محفوظة</p>
  </footer>

  <!-- صندوق الشات -->
  <div id="chat-box">
    <div id="chat-messages"></div>
    <form id="chat-form">
      <input type="text" id="chat-input" placeholder="اكتب رسالتك..." required />
      <button type="submit" id="send-btn">إرسال</button>
    </form>
  </div>

  <script>
    const chatForm = document.getElementById("chat-form");
    const chatInput = document.getElementById("chat-input");
    const chatMessages = document.getElementById("chat-messages");

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const userMessage = chatInput.value.trim();
      if (!userMessage) return;

      appendMessage("user", userMessage);
      chatInput.value = "";

      try {
        const res = await fetch("https://my-backend-cyj8.onrender.com/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMessage })
        });

        const data = await res.json();
        appendMessage("bot", data.reply || "⚠️ لم أتمكن من الحصول على رد.");
      } catch (err) {
        appendMessage("bot", "⚠️ خطأ في الاتصال بالسيرفر.");
      }
    });

    function appendMessage(sender, text) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  </script>
</body>
</html>
