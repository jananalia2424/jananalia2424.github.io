<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>موقعي العصري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Cairo',sans-serif; background:#0f172a; color:#f1f5f9; }
    header { background:#1e293b; padding:20px; text-align:center; }
    nav { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin:15px 0; }
    nav button { background:#334155; border:none; color:#f1f5f9; padding:6px 14px; border-radius:20px; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px; padding:15px; }
    .grid img { width:100%; height:180px; object-fit:cover; border-radius:10px; }
    footer { background:#1e293b; text-align:center; padding:10px; margin-top:20px; color:#94a3b8; }

    /* Chat Support */
    #support { padding:20px; text-align:center; }
    #chatBox { max-width:600px; margin:20px auto; padding:10px; background:#1e293b; border-radius:10px; }
    #messages { height:200px; overflow-y:auto; border:1px solid #334155; padding:10px; background:#0f172a; }
    #messages p { margin:5px 0; }
    #inputRow { display:flex; margin-top:10px; }
    #userInput { flex:1; padding:8px; border:none; border-radius:5px; }
    #sendBtn { padding:8px 12px; margin-left:5px; background:#334155; border:none; border-radius:5px; color:#fff; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقعي العصري</h1>
    <p>معرض صور + أقسام + دردشة دعم</p>
    <div>
      <form action="https://www.google.com/search" method="get" target="_blank">
        <input type="text" name="q" placeholder="ابحث في جوجل..." style="padding:5px;border-radius:5px;border:none;">
        <button type="submit">🔍</button>
      </form>
    </div>
  </header>

  <nav>
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('nature')">طبيعة</button>
    <button onclick="filter('cities')">مدن</button>
    <button onclick="filter('art')">فن</button>
    <button onclick="filter('heritage')">آثار</button>
    <button onclick="showSection('about')">من نحن</button>
    <button onclick="showSection('support')">فريق الدعم</button>
  </nav>

  <main class="grid" id="gallery">
    <!-- أمثلة صور -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="جبال">
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="مدينة">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="شلال">
    <img src="https://images.unsplash.com/photo-1528909514045-2fa4ac7a08ba?q=80&w=800" data-cat="heritage" alt="آثار قديمة">
    <!-- زيد صور أثرية أخرى حسب الحاجة -->
  </main>

  <section id="about" style="display:none;padding:20px;text-align:center;">
    <h2>من نحن</h2>
    <p>زورونا على المواقع التالية:</p>
    <ul>
      <li><a href="https://www.youtube.com/@jananalia2424" target="_blank">قناتي على YouTube 1</a></li>
      <li><a href="https://www.youtube.com/@jananalia24" target="_blank">قناتي على YouTube 2</a></li>
      <li><a href="https://www.facebook.com/groups/jananalia2424" target="_blank">مجموعة Facebook</a></li>
    </ul>
  </section>

  <section id="support" style="display:none;">
    <h2>فريق الدعم — ChatGPT</h2>
    <div id="chatBox">
      <div id="messages"></div>
      <div id="inputRow">
        <input id="userInput" type="text" placeholder="اكتب رسالتك هنا...">
        <button id="sendBtn">إرسال</button>
      </div>
    </div>
  </section>

  <footer>
    © 2025 موقعي العصري — جميع الحقوق محفوظة
  </footer>

  <script>
    function filter(cat) {
      document.querySelectorAll('#gallery img').forEach(img => {
        img.style.display = (cat === 'all' || img.dataset.cat === cat) ? 'block' : 'none';
      });
      showSection('gallery');
    }

    function showSection(id) {
      document.getElementById('gallery').style.display = id==='gallery'?'grid':'none';
      document.getElementById('about').style.display = id==='about'?'block':'none';
      document.getElementById('support').style.display = id==='support'?'block':'none';
    }

    // Chat support
    const API_ENDPOINT = "https://YOUR-BACKEND.onrender.com/api/chat"; // غيّر هذا لاحقا
    document.getElementById("sendBtn").onclick = async () => {
      const input = document.getElementById("userInput");
      const msg = input.value.trim();
      if(!msg) return;
      addMessage("👤: " + msg);
      input.value = "";
      try {
        const res = await fetch(API_ENDPOINT,{
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({ message: msg })
        });
        const data = await res.json();
        addMessage("🤖: " + (data.reply || "لم أتمكن من الرد."));
      } catch(e){
        addMessage("⚠️ خطأ في الاتصال بالخادم.");
      }
    };

    function addMessage(text){
      const box=document.getElementById("messages");
      const p=document.createElement("p");
      p.textContent=text;
      box.appendChild(p);
      box.scrollTop=box.scrollHeight;
    }
  </script>
</body>
</html>
