
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📸 موقع الصور الجميلة — معرض</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    header {
      background: #1e293b;
      padding: 15px;
      text-align: center;
    }
    header h1 { margin: 0; }

    /* 🔍 شريط البحث */
    .search-bar {
      text-align: center;
      margin: 15px;
    }
    .search-bar input {
      padding: 8px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }
    .search-bar button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #334155;
      color: #f1f5f9;
      cursor: pointer;
    }

    .categories {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .categories button {
      background: #334155;
      border: none;
      color: #f1f5f9;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
      gap: 10px;
      padding: 15px;
    }
    .grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }
    footer {
      background: #1e293b;
      text-align: center;
      padding: 10px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>
    <h1>📸 موقع الصور الجميلة</h1>
    <p>معرض عام يحتوي على أجمل الصور</p>
  </header>

  <!-- 🔍 شريط البحث -->
  <div class="search-bar">
    <form action="https://www.google.com/search" method="GET" target="_blank">
      <input type="text" name="q" placeholder="ابحث في جوجل..." />
      <button type="submit">🔍</button>
    </form>
  </div>

  <!-- 🔘 التصنيفات -->
  <nav class="categories">
    <button onclick="filter('all')">الكل</button>
    <button onclick="filter('nature')">طبيعة</button>
    <button onclick="filter('cities')">مدن</button>
    <button onclick="window.open('https://www.youtube.com/@jananalia2424', '_blank')">فن</button>
    <button onclick="filter('heritage')">آثار</button>
  </nav>

  <!-- 🖼️ الصور -->
  <main class="grid" id="gallery">
    <!-- طبيعة -->
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800" data-cat="nature" alt="جبال">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" data-cat="nature" alt="شلال">

    <!-- مدن -->
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?q=80&w=800" data-cat="cities" alt="مدينة بودابست">
    <img src="https://images.unsplash.com/photo-1526481280691-9062fdca7f04?q=80&w=800" data-cat="cities" alt="مدينة بخارست">

    <!-- آثار -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Timgad_Ruins_Algeria.jpg" data-cat="heritage" alt="تيمقاد">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/Djemila_-_Theatre.jpg" data-cat="heritage" alt="جميلة">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Colosseum_in_Rome%2C_Italy_-_April_2007.jpg" data-cat="heritage" alt="الكولوسيوم روما">
  </main>

  <footer>
    © 2025 موقع الصور الجميلة — جميع الحقوق محفوظة
  </footer>

  <script>
    function filter(cat) {
      document.querySelectorAll('#gallery img').forEach(img => {
        if (cat === 'all' || img.dataset.cat === cat) {
          img.style.display = 'block';
        } else {
          img.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
