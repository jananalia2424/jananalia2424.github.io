<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>موقع الدعم</title>
  <style>
    body { font-family: "Tahoma", sans-serif; background: #f4f4f4; margin: 0; padding: 0; direction: rtl; color: #333; }
    h2 { text-align: center; color: #0d6efd; margin: 30px 0 15px; }

    /* 🔎 الهيدر + البحث */
    .header { background: #0d6efd; padding: 15px; display: flex; justify-content: center; align-items: center; }
    .search-box { display: flex; background: #fff; border-radius: 25px; padding: 5px 10px; width: 100%; max-width: 500px; }
    .search-box input { border: none; outline: none; flex: 1; padding: 8px; font-size: 16px; }
    .search-box button { background: none; border: none; cursor: pointer; }
    .search-box svg { width: 20px; height: 20px; fill: #0d6efd; }

    /* 💬 الدردشة */
    .chat-container { width: 100%; max-width: 600px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); overflow: hidden; }
    .messages { height: 300px; overflow-y: auto; padding: 20px; }
    .message { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 80%; }
    .user { background: #d1e7dd; align-self: flex-end; text-align: right; }
    .bot { background: #f8d7da; align-self: flex-start; text-align: left; }
    .input-container { display: flex; border-top: 1px solid #ccc; }
    input.chat-input { flex: 1; padding: 10px; border: none; }
    button.send-btn { padding: 10px 20px; border: none; background: #0d6efd; color: #fff; cursor: pointer; }
    button.send-btn:hover { background: #0b5ed7; }
    .messages-wrapper { display: flex; flex-direction: column; }

    /* 👥 من نحن */
    .about { background: #fff; margin: 40px auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 900px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
    .about p { line-height: 1.8; font-size: 18px; }

    /* 🖼️ المعرض */
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 30px auto; width: 90%; max-width: 900px; }
    .gallery img { width: 100%; border-radius: 10px; box-shadow: 0 0 8px rgba(0,0,0,0.1); transition: transform 0.3s; }
    .gallery img:hover { transform: scale(1.05); }

    /* 🔗 روابط */
    .links { text-align: center; margin: 40px 0; }
    .links a { margin: 0 10px; text-decoration: none; font-size: 18px; color: #fff; background: #0d6efd; padding: 10px 20px; border-radius: 30px; transition: 0.3s; }
    .links a:hover { background: #0b5ed7; }
  </style>
</head>
<body>
  <!-- 🔎 محرك البحث -->
  <div class="header">
    <form class="search-box" method="GET" action="https://www.google.com/search" target="_blank">
      <input type="text" name="q" placeholder="ابحث في Google..." required />
      <button type="submit">
        <!-- أيقونة مجهر -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M21 20l-5.8-5.8a7 7 0 1 0-1.4 1.4L20 21zM4 10a6 6 0 1 1 12 0 6 6 0 0 1-12 0z"/>
        </svg>
      </button>
    </form>
  </div>

  <!-- 💬 واجهة الدردشة -->
  <div class="chat-container">
    <div id="messages" class="messages messages-wrapper"></div>
    <div class="input-container">
      <input type="text" id="userInput" class="chat-input" placeholder="اكتب رسالتك..." onkeydown="if(event.key==='Enter'){sendMessage()}"/>
      <button class="send-btn" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <!-- 👥 من نحن -->
  <div class="about">
    <h2>من نحن</h2>
    <p>
      نحن <strong>فريق دعم تقني</strong> متخصصون في مساعدة المستخدمين
      وحل المشاكل التقنية بسرعة وفعالية.
      هدفنا تقديم خدمة ودية، واضحة، وبسيطة.
    </p>
  </div>

  <!-- 🖼️ المعرض -->
  <h2>المعرض</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300x200.png?text=صورة+1" alt="صورة 1" />
    <img src="https://via.placeholder.com/300x200.png?text=صورة+2" alt="صورة 2" />
    <img src="https://via.placeholder.com/300x200.png?text=صورة+3" alt="صورة 3" />
    <img src="https://via.placeholder.com/300x200.png?text=صورة+4" alt="صورة 4" />
  </div>

  <!-- 🔗 روابط القنوات -->
  <div class="links">
    <a href="https://www.youtube.com/@YourChannel" target="_blank">📺 قناتنا على يوتيوب</a>
    <a href="https://www.facebook.com/groups/YourGroup" target="_blank">👥 زورونا على فايسبوك</a>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const msg = input.value.trim();
      if (!msg) return;

      addMessage("أنت", msg, "user");
      input.value = "";

      try {
        const res = await fetch("http://localhost:5000/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });

        const data = await res.json();
        addMessage("فريق الدعم", data.reply, "bot");
      } catch (err) {
        addMessage("⚠️ خطأ", "تعذر الاتصال بالسيرفر", "bot");
      }
    }

    function addMessage(sender, text, type) {
      const messagesDiv = document.getElementById("messages");
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", type);
      msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
